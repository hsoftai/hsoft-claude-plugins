name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: src/go.sum
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test ./... -race -count=1
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: src

  build:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: src
    strategy:
      matrix:
        include:
          - { goos: darwin,  goarch: arm64 }
          - { goos: darwin,  goarch: amd64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64, ext: .exe }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: src/go.sum
      - name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          out="../plugins/secrets-guard/bin/secrets-guard-${GOOS}-${GOARCH}${{ matrix.ext }}"
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME:-dev}" -o "$out" ./cmd/secrets-guard
      - uses: actions/upload-artifact@v4
        with:
          name: secrets-guard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: plugins/secrets-guard/bin/secrets-guard-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext }}
